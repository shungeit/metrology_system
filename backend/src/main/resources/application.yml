spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/metrology_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:metrology}
    password: ${SPRING_DATASOURCE_PASSWORD:metrology123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

jwt:
  secret: metrology-jwt-secret-key-at-least-32-chars-2024
  expiration: 86400000

upload:
  path: ${UPLOAD_PATH:/app/uploads}

logging:
  level:
    com.metrology: INFO
